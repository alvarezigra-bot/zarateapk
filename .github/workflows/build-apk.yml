name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: android-actions/setup-android@v3
      - run: cd zarate-emergente-2040 && npm install
      - run: cd zarate-emergente-2040 && npx cap sync android
      - run: echo "sdk.dir=$ANDROID_SDK_ROOT" > zarate-emergente-2040/android/local.properties
      - run: chmod +x zarate-emergente-2040/android/gradlew
      - run: cd zarate-emergente-2040/android && ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: ZarateApp-debug
          path: zarate-emergente-2040/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
